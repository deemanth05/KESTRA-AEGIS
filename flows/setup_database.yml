id: setup_database
namespace: aegis
description: |
  Initializes the DuckDB database with clean demo data and Aegis system tables.
  Run this FIRST before any other Aegis flow.
  Tables created: orders, customers (demo data), fix_history (learning memory), 
  incident_log (correlation), data_quality_baselines (anomaly detection).

labels:
  flow_type: "setup"

tasks:
  - id: init_duckdb
    type: io.kestra.plugin.scripts.python.Script
    containerImage: python:3.11-slim
    beforeCommands:
      - pip install duckdb==1.3.0
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - /tmp/kestra-wd:/app/data
    script: |
      import duckdb
      import os
      import json
      from datetime import datetime

      os.makedirs("/app/data", exist_ok=True)
      db_path = "/app/data/pipeline.duckdb"
      print(f"Connecting to database at {db_path}...")
      con = duckdb.connect(db_path)

      # ═══════════════════════════════════════════════════
      # TABLE 1: orders (Demo Pipeline Data)
      # ═══════════════════════════════════════════════════
      con.execute("DROP TABLE IF EXISTS orders")
      con.execute("""
        CREATE TABLE orders (
          order_id INTEGER PRIMARY KEY,
          customer_name VARCHAR,
          amount DECIMAL(10,2),
          order_date DATE
        )
      """)

      orders_data = [
          (1, 'Alice Smith', 120.50, '2026-06-01'),
          (2, 'Bob Johnson', 45.00, '2026-06-01'),
          (3, 'Charlie Brown', 350.75, '2026-06-02'),
          (4, 'Diana Prince', 99.99, '2026-06-02'),
          (5, 'Evan Wright', 12.50, '2026-06-02'),
          (6, 'Fiona Gallagher', 88.40, '2026-06-03'),
          (7, 'George Costanza', 150.00, '2026-06-03'),
          (8, 'Hannah Abbott', 62.10, '2026-06-03'),
          (9, 'Ian Malcolm', 210.00, '2026-06-04'),
          (10, 'Julia Roberts', 75.25, '2026-06-04'),
          (11, 'Kevin Bacon', 19.99, '2026-06-04'),
          (12, 'Laura Croft', 500.00, '2026-06-05'),
          (13, 'Michael Scott', 15.45, '2026-06-05'),
          (14, 'Nora Jones', 135.00, '2026-06-05'),
          (15, 'Oscar Martinez', 90.80, '2026-06-05'),
      ]
      con.executemany("INSERT INTO orders VALUES (?, ?, ?, ?)", orders_data)
      order_count = con.execute("SELECT COUNT(*) FROM orders").fetchone()[0]
      print(f"✅ Loaded {order_count} rows into 'orders' table.")

      # ═══════════════════════════════════════════════════
      # TABLE 2: customers (Multi-Pipeline Demo Data)
      # ═══════════════════════════════════════════════════
      con.execute("DROP TABLE IF EXISTS customers")
      con.execute("""
        CREATE TABLE customers (
          customer_id INTEGER PRIMARY KEY,
          name VARCHAR,
          email VARCHAR,
          signup_date DATE,
          lifetime_value DECIMAL(10,2)
        )
      """)

      customers_data = [
          (1, 'Alice Smith', 'alice@example.com', '2025-01-15', 1250.50),
          (2, 'Bob Johnson', 'bob@example.com', '2025-02-20', 890.00),
          (3, 'Charlie Brown', 'charlie@example.com', '2025-03-10', 2100.75),
          (4, 'Diana Prince', 'diana@example.com', '2025-04-05', 450.99),
          (5, 'Evan Wright', 'evan@example.com', '2025-05-12', 3200.00),
          (6, 'Fiona Gallagher', 'fiona@example.com', '2025-06-18', 175.25),
          (7, 'George Costanza', 'george@example.com', '2025-07-22', 920.40),
          (8, 'Hannah Abbott', 'hannah@example.com', '2025-08-30', 1580.00),
          (9, 'Ian Malcolm', 'ian@example.com', '2025-09-14', 680.90),
          (10, 'Julia Roberts', 'julia@example.com', '2025-10-01', 4500.00),
      ]
      con.executemany("INSERT INTO customers VALUES (?, ?, ?, ?, ?)", customers_data)
      customer_count = con.execute("SELECT COUNT(*) FROM customers").fetchone()[0]
      print(f"✅ Loaded {customer_count} rows into 'customers' table.")

      # ═══════════════════════════════════════════════════
      # TABLE 3: fix_history (Learning Memory System)
      # ═══════════════════════════════════════════════════
      con.execute("DROP TABLE IF EXISTS fix_history")
      con.execute("""
        CREATE TABLE fix_history (
          id INTEGER PRIMARY KEY,
          error_signature VARCHAR,
          error_type VARCHAR,
          affected_table VARCHAR,
          error_message_pattern VARCHAR,
          fix_type VARCHAR,
          fix_code VARCHAR,
          root_cause VARCHAR,
          explanation VARCHAR,
          confidence DOUBLE,
          risk_assessment VARCHAR,
          success BOOLEAN DEFAULT TRUE,
          applied_count INTEGER DEFAULT 1,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
          last_applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        )
      """)
      # Create index on error_signature for fast memory lookups
      con.execute("CREATE INDEX idx_fix_signature ON fix_history(error_signature)")
      print("✅ Created 'fix_history' table with signature index (learning memory).")

      # ═══════════════════════════════════════════════════
      # TABLE 4: incident_log (Incident Correlation)
      # ═══════════════════════════════════════════════════
      con.execute("DROP TABLE IF EXISTS incident_log")
      con.execute("""
        CREATE TABLE incident_log (
          id INTEGER PRIMARY KEY,
          pipeline_name VARCHAR,
          error_type VARCHAR,
          error_message VARCHAR,
          affected_table VARCHAR,
          risk_level VARCHAR,
          status VARCHAR DEFAULT 'PENDING',
          root_cause VARCHAR,
          fix_code VARCHAR,
          fix_source VARCHAR,
          correlation_id VARCHAR,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
          resolved_at TIMESTAMP
        )
      """)
      print("✅ Created 'incident_log' table (correlation engine).")

      # ═══════════════════════════════════════════════════
      # TABLE 5: data_quality_baselines (Anomaly Detection)
      # ═══════════════════════════════════════════════════
      con.execute("DROP TABLE IF EXISTS data_quality_baselines")
      con.execute("""
        CREATE TABLE data_quality_baselines (
          id INTEGER PRIMARY KEY,
          table_name VARCHAR,
          metric_name VARCHAR,
          expected_min DOUBLE,
          expected_max DOUBLE,
          description VARCHAR,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        )
      """)

      baselines = [
          # Orders table baselines
          (1, 'orders', 'row_count', 10, 10000, 'Expected row count range'),
          (2, 'orders', 'null_amount_pct', 0, 5.0, 'Max acceptable NULL percentage in amount column'),
          (3, 'orders', 'avg_amount', 10.0, 1000.0, 'Expected average order amount range'),
          (4, 'orders', 'min_amount', 0.0, 50.0, 'Expected minimum order amount'),
          (5, 'orders', 'max_amount', 50.0, 5000.0, 'Expected maximum order amount'),
          # Customers table baselines
          (6, 'customers', 'row_count', 5, 50000, 'Expected customer count range'),
          (7, 'customers', 'null_email_pct', 0, 2.0, 'Max acceptable NULL percentage in email column'),
          (8, 'customers', 'avg_lifetime_value', 100.0, 10000.0, 'Expected average lifetime value range'),
          (9, 'customers', 'min_lifetime_value', 0.0, 500.0, 'Expected minimum lifetime value'),
          (10, 'customers', 'max_lifetime_value', 500.0, 100000.0, 'Expected maximum lifetime value'),
      ]
      con.executemany(
          "INSERT INTO data_quality_baselines (id, table_name, metric_name, expected_min, expected_max, description) VALUES (?, ?, ?, ?, ?, ?)",
          baselines
      )
      print("✅ Created 'data_quality_baselines' table with 10 baseline rules (orders + customers).")

      # ═══════════════════════════════════════════════════
      # Summary
      # ═══════════════════════════════════════════════════
      tables = con.execute("SELECT table_name FROM information_schema.tables WHERE table_schema = 'main'").fetchall()
      table_names = [t[0] for t in tables]
      print(f"\n📊 Database initialized with {len(table_names)} tables: {', '.join(table_names)}")

      summary = {
          "tables_created": len(table_names),
          "table_names": ", ".join(table_names),
          "orders_loaded": order_count,
          "customers_loaded": customer_count
      }
      print(f"::{json.dumps({'outputs': summary})}::", flush=True)

      con.close()
      print("\n🎯 Database setup complete. Ready for Aegis operations.")
