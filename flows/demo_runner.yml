id: demo_runner
namespace: aegis
description: |
  🎬 Kestra Aegis — One-Click Full Demo Runner
  
  Orchestrates the complete Aegis demonstration sequence:
  1. Reset database to clean state
  2. Run TYPE_MISMATCH → auto-heals via AI
  3. Run TYPE_MISMATCH again → instant fix from MEMORY (no AI call!)
  4. Run NULL_VIOLATION → auto-heals 
  5. Run CUSTOMER_DATA_CORRUPTION → cross-table correlation
  6. Generate health dashboard with full stats
  
  Demonstrates: Subflows, sequential orchestration, learning loop, 
  multi-table correlation, and proactive monitoring.

labels:
  flow_type: "demo"

tasks:
  # ══════════════════════════════════════════════════════════
  # STEP 1: Initialize clean database
  # ══════════════════════════════════════════════════════════
  - id: step1_setup
    type: io.kestra.plugin.core.flow.Subflow
    description: |
      **Database Reset** — Initializes DuckDB with clean demo data and empty system tables.
    flowId: setup_database
    namespace: aegis
    wait: true
    transmitFailed: true

  - id: log_step1
    type: io.kestra.plugin.core.log.Log
    message: |
      ✅ STEP 1 COMPLETE — Database initialized with clean data.
      ═══════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════
  # STEP 2: TYPE_MISMATCH — First run (AI diagnosis)
  # ══════════════════════════════════════════════════════════
  - id: step2_type_mismatch_ai
    type: io.kestra.plugin.core.flow.Subflow
    description: |
      **First TYPE_MISMATCH** — Injects bad data and triggers AI-powered diagnosis. 
      Gemini analyzes the error and generates a fix. Fix is stored in memory.
    flowId: failure_simulator
    namespace: aegis
    inputs:
      failure_type: TYPE_MISMATCH
    wait: true
    transmitFailed: true

  - id: wait_for_healing_1
    type: io.kestra.plugin.scripts.python.Script
    description: |
      **Cooldown** — Waits for the self-healing flow to complete before proceeding.
    script: |
      import time
      print("⏳ Waiting 30s for self-healing to complete...")
      time.sleep(30)
      print("✅ Proceeding to next scenario.")

  - id: log_step2
    type: io.kestra.plugin.core.log.Log
    message: |
      ✅ STEP 2 COMPLETE — TYPE_MISMATCH healed via AI diagnosis.
      The fix has been stored in memory for future reuse!
      ═══════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════
  # STEP 3: TYPE_MISMATCH — Second run (MEMORY hit!)
  # ══════════════════════════════════════════════════════════
  - id: step3_type_mismatch_memory
    type: io.kestra.plugin.core.flow.Subflow
    description: |
      **Second TYPE_MISMATCH** — Same error type triggers again. This time Aegis finds 
      a proven fix in memory and applies it instantly — NO Gemini API call needed!
    flowId: failure_simulator
    namespace: aegis
    inputs:
      failure_type: TYPE_MISMATCH
    wait: true
    transmitFailed: true

  - id: wait_for_healing_2
    type: io.kestra.plugin.scripts.python.Script
    description: |
      **Cooldown** — Waits for the memory-based self-healing to complete.
    script: |
      import time
      print("⏳ Waiting 25s for memory-based healing...")
      time.sleep(25)
      print("✅ Memory hit confirmed — zero AI latency!")

  - id: log_step3
    type: io.kestra.plugin.core.log.Log
    message: |
      ✅ STEP 3 COMPLETE — TYPE_MISMATCH healed via MEMORY (no AI call!).
      🧠 The learning loop is working — the system got smarter.
      ═══════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════
  # STEP 4: NULL_VIOLATION — Auto-heal
  # ══════════════════════════════════════════════════════════
  - id: step4_null_violation
    type: io.kestra.plugin.core.flow.Subflow
    description: |
      **NULL_VIOLATION** — Sets NULL values in required columns. Aegis detects, 
      diagnoses, and auto-heals by cleaning the corrupted data.
    flowId: failure_simulator
    namespace: aegis
    inputs:
      failure_type: NULL_VIOLATION
    wait: true
    transmitFailed: true

  - id: wait_for_healing_3
    type: io.kestra.plugin.scripts.python.Script
    description: |
      **Cooldown** — Waits for NULL_VIOLATION healing to complete.
    script: |
      import time
      print("⏳ Waiting 30s for NULL_VIOLATION healing...")
      time.sleep(30)
      print("✅ NULL values cleaned successfully.")

  - id: log_step4
    type: io.kestra.plugin.core.log.Log
    message: |
      ✅ STEP 4 COMPLETE — NULL_VIOLATION auto-healed.
      ═══════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════
  # STEP 5: CUSTOMER_DATA_CORRUPTION — Cross-table correlation
  # ══════════════════════════════════════════════════════════
  - id: step5_customer_corruption
    type: io.kestra.plugin.core.flow.Subflow
    description: |
      **Cross-Table Correlation** — Corrupts customer emails. Aegis correlates this 
      with recent order incidents to identify shared patterns across tables.
    flowId: failure_simulator
    namespace: aegis
    inputs:
      failure_type: CUSTOMER_DATA_CORRUPTION
    wait: true
    transmitFailed: true

  - id: wait_for_healing_4
    type: io.kestra.plugin.scripts.python.Script
    description: |
      **Cooldown** — Waits for cross-table healing to complete.
    script: |
      import time
      print("⏳ Waiting 30s for cross-table correlation healing...")
      time.sleep(30)
      print("✅ Customer data corruption healed with incident correlation.")

  - id: log_step5
    type: io.kestra.plugin.core.log.Log
    message: |
      ✅ STEP 5 COMPLETE — Customer data corruption healed with cross-table correlation.
      ═══════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════
  # STEP 6: Generate Health Dashboard
  # ══════════════════════════════════════════════════════════
  - id: step6_dashboard
    type: io.kestra.plugin.core.flow.Subflow
    description: |
      **Final Report** — Generates the Aegis health dashboard showing MTTR, 
      success rates, memory efficiency, and the complete incident timeline.
    flowId: health_dashboard
    namespace: aegis
    wait: true
    transmitFailed: true

  - id: demo_complete
    type: io.kestra.plugin.core.log.Log
    description: |
      **Demo Summary** — Final status report for the complete demonstration.
    message: |
      ══════════════════════════════════════════════════════════
      🎬 KESTRA AEGIS — DEMO COMPLETE!
      ══════════════════════════════════════════════════════════
      
      ✅ Step 1: Database initialized
      ✅ Step 2: TYPE_MISMATCH → AI diagnosis + auto-heal + fix stored in memory
      ✅ Step 3: TYPE_MISMATCH → MEMORY hit! Instant fix, zero AI calls
      ✅ Step 4: NULL_VIOLATION → Auto-healed
      ✅ Step 5: CUSTOMER_DATA_CORRUPTION → Cross-table correlation
      ✅ Step 6: Health dashboard generated
      
      🧠 Key Insight: The system LEARNED from Step 2 and applied that 
         knowledge instantly in Step 3. Every incident makes Aegis smarter.
      
      🛡️ Kestra Features Demonstrated:
         • Subflows (shared remediation logic)
         • Webhook Triggers (failure ingestion)
         • Schedule Triggers (anomaly monitoring)
         • Flow Triggers (event-driven chaining)
         • Pause/Resume (human-in-the-loop)
         • ForEach (multi-table scanning)
         • Switch/If (risk-based routing)
         • Labels, Outputs, Globals, Secrets
         • Docker Task Runner
         • Retry (exponential backoff)
         • KV Store (cross-execution state)
         • Custom Metrics (MTTR, cache hits)
         • Plugin Defaults (DRY configuration)
         • Global Error Handler
      ══════════════════════════════════════════════════════════
